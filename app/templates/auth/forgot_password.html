{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block auth_content %}
<div class="login-page">
  <div class="login-card" style="max-width:460px">

    <div class="login-logo" style="background:#E67E22">
      <i class="bi bi-key-fill"></i>
    </div>

    <div class="login-title">Reset Password</div>
    <div class="login-sub">
      Enter your username to receive a one-time password by email
    </div>

    <!-- STEP 1 -->
    <div id="step1">
      <input type="text" id="resetUsername" placeholder="Username" class="form-control mb-3"/>
      <button id="btnSend" onclick="sendOTP(event)" class="btn btn-warning w-100">
        Send OTP
      </button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" style="display:none">
      <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" class="form-control mb-3"/>
      <button id="btnVerify" onclick="verifyOTP(event)" class="btn btn-primary w-100">
        Verify OTP
      </button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" style="display:none">
      <input type="password" id="newPwd" placeholder="New Password" class="form-control mb-2"/>
      <input type="password" id="confPwd" placeholder="Confirm Password" class="form-control mb-3"/>
      <button id="btnReset" onclick="resetPwd(event)" class="btn btn-success w-100">
        Reset Password
      </button>
    </div>

    <div id="msg" class="mt-3 text-center"></div>

    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}">← Back to login</a>
    </div>

  </div>
</div>

<script>
let savedUsername = "";

// Safe DOM refs
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");

function showMsg(msg, color="red") {
  document.getElementById("msg").innerHTML =
    `<span style="color:${color}">${msg}</span>`;
}

function setLoading(btn, state=true, text="Please wait...") {
  if (state) {
    btn.disabled = true;
    btn.dataset.oldText = btn.innerText;
    btn.innerText = text;
  } else {
    btn.disabled = false;
    btn.innerText = btn.dataset.oldText;
  }
}

// ================= SEND OTP =================
async function sendOTP(event) {
  const btn = event.target;
  const username = document.getElementById("resetUsername").value.trim();

  if (!username) return showMsg("Enter username");

  setLoading(btn, true);

  try {
    const fd = new FormData();
    fd.append("username", username);

    const res = await fetch("/auth/forgot-password", {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if (data.success) {
      savedUsername = username;
      step1.style.display = "none";
      step2.style.display = "block";
      showMsg("OTP sent successfully!", "green");
    } else {
      showMsg(data.message);
    }

  } catch (err) {
    showMsg("Network error. Try again.");
  }

  setLoading(btn, false);
}

// ================= VERIFY OTP =================
async function verifyOTP(event) {
  const btn = event.target;
  const otp = document.getElementById("otpInput").value.trim();

  if (!otp || otp.length !== 6 || isNaN(otp)) {
    return showMsg("Enter valid 6-digit OTP");
  }

  setLoading(btn, true);

  try {
    const fd = new FormData();
    fd.append("username", savedUsername);
    fd.append("otp", otp);

    const res = await fetch("/auth/verify-otp", {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if (data.success) {
      step2.style.display = "none";
      step3.style.display = "block";
      showMsg("OTP verified!", "green");
    } else {
      showMsg(data.message);
    }

  } catch (err) {
    showMsg("Network error.");
  }

  setLoading(btn, false);
}

// ================= RESET PASSWORD =================
async function resetPwd(event) {
  const btn = event.target;

  const np = document.getElementById("newPwd").value;
  const cp = document.getElementById("confPwd").value;
  const otp = document.getElementById("otpInput").value;

  if (!np || np.length < 6) {
    return showMsg("Password must be at least 6 characters");
  }

  if (np !== cp) {
    return showMsg("Passwords do not match");
  }

  setLoading(btn, true);

  try {
    const fd = new FormData();
    fd.append("username", savedUsername);
    fd.append("otp", otp);
    fd.append("new_password", np);

    const res = await fetch("/auth/reset-password", {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if (data.success) {
      showMsg("Password updated! Redirecting...", "green");
      setTimeout(() => {
        window.location.href = "/auth/login";
      }, 1500);
    } else {
      showMsg(data.message);
    }

  } catch (err) {
    showMsg("Network error.");
  }

  setLoading(btn, false);
}
</script>
{% endblock %}
